<!DOCTYPE html>
<html lang="en">
<head><title>{% block title %}Admin{% endblock %} - Turkish Times</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: {
                'turkish-red': '#E30A17', 'turkish-dark': '#0f1014',
                'turkish-darker': '#050507', 'turkish-gold': '#C6A87C',
                'turkish-gray': '#1E1E24',
            }}}
        }
        if (localStorage.getItem('admin-dark') === 'true') document.documentElement.classList.add('dark');
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-turkish-darker min-h-screen text-gray-900 dark:text-gray-100 transition-colors">
    <nav class="bg-white dark:bg-turkish-dark shadow-sm px-6 py-4 flex items-center justify-between border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center gap-8">
            <a href="/admin/dashboard" class="text-xl font-bold text-red-600 flex items-center gap-2">
                <img src="{{ app_url }}/images/logo.png" alt="" class="h-8">
                <span class="hidden md:inline">Admin</span>
            </a>
            <div class="hidden md:flex items-center gap-4 text-sm">
                <a href="/" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300"><i class="fas fa-external-link-alt mr-1"></i>View Site</a>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="document.documentElement.classList.toggle('dark');localStorage.setItem('admin-dark',document.documentElement.classList.contains('dark'))"
                    class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline"></i>
            </button>
            <form action="/admin/logout" method="POST">
                <button class="flex items-center gap-2 px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </form>
        </div>
    </nav>
    <div class="flex">
        <aside class="w-64 bg-white dark:bg-turkish-dark min-h-screen border-r border-gray-200 dark:border-gray-700 p-4 hidden md:block">
            <nav class="space-y-1">
                <a href="/admin/dashboard" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-chart-pie w-5 text-gray-400 dark:text-gray-500"></i> Dashboard</a>
                <a href="/admin/series" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-film w-5 text-gray-400 dark:text-gray-500"></i> Series</a>
                <a href="/admin/seasons" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-layer-group w-5 text-gray-400 dark:text-gray-500"></i> Seasons</a>
                <a href="/admin/episodes" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-video w-5 text-gray-400 dark:text-gray-500"></i> Episodes</a>
                <a href="/admin/subtitles" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-closed-captioning w-5 text-gray-400 dark:text-gray-500"></i> Subtitles</a>
                <a href="/admin/settings" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-cog w-5 text-gray-400 dark:text-gray-500"></i> Settings</a>
            </nav>
        </aside>
        <main class="flex-1 p-8 bg-gray-50 dark:bg-turkish-darker min-h-screen">{% block content %}{% endblock %}</main>
    </div>
</body></html>
