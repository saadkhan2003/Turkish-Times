{% extends "admin/layouts/app.html" %}
{% block title %}Add Subtitle - Admin{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <a href="/admin/subtitles" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 text-sm mb-4 inline-block transition">
        <i class="fas fa-arrow-left mr-1"></i>Back to Subtitles
    </a>
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">Upload Subtitle</h1>
    <form method="POST" enctype="multipart/form-data" class="bg-white dark:bg-turkish-dark rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Episode ID</label>
            <input type="number" name="episode_id" required
                   class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-red-500 transition">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Language</label>
            <select name="language" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-red-500 transition">
                <option value="urdu">Urdu</option>
                <option value="english">English</option>
                <option value="arabic">العربية</option>
                <option value="turkish">Türkçe</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Subtitle File (VTT/SRT)</label>
            <input type="file" name="subtitle_file" accept=".vtt,.srt,.txt"
                   class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-red-50 file:text-red-600 hover:file:bg-red-100 transition">
        </div>
        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_default" value="1" id="is_default"
                   class="rounded border-gray-300 text-red-600 focus:ring-red-500">
            <label for="is_default" class="text-sm text-gray-700 dark:text-gray-300">Set as default subtitle</label>
        </div>
        <div class="flex gap-4 pt-4 border-t border-gray-100 dark:border-gray-700">
            <button type="submit" class="px-6 py-2.5 bg-red-600 text-white font-medium rounded-lg hover:bg-red-700 transition shadow-sm">
                <i class="fas fa-upload mr-2"></i>Upload Subtitle
            </button>
            <a href="/admin/subtitles" class="px-6 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
