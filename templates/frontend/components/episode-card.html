<a href="/watch/{{ episode.id }}" class="group block relative">
    <div class="relative aspect-video rounded-xl overflow-hidden bg-turkish-charcoal shadow-lg transition-all duration-500 group-hover:shadow-turkish-red/30 group-hover:shadow-2xl group-hover:-translate-y-2 ring-1 ring-white/5 group-hover:ring-turkish-red/30">
        <img src="{% if episode.thumbnail %}{{ app_url }}/uploads/thumbnails/{{ episode.thumbnail }}{% elif episode.series_thumbnail %}{{ app_url }}/uploads/thumbnails/{{ episode.series_thumbnail }}{% else %}{{ app_url }}/images/logo.png{% endif %}" alt="{{ episode.title }}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-70 group-hover:opacity-95 transition-opacity duration-500"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-in-out"></div>
        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500 z-10">
            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-turkish-red to-red-800 text-white flex items-center justify-center transform scale-50 group-hover:scale-100 transition-all duration-500 shadow-xl shadow-red-900/50 ring-2 ring-white/20">
                <i class="fas fa-play text-lg ml-1"></i>
            </div>
        </div>
        <div class="absolute top-3 left-3 z-20">
            <span class="px-2.5 py-1 bg-gradient-to-r from-turkish-red to-red-700 backdrop-blur-md text-white text-[10px] font-bold uppercase tracking-wider rounded shadow-lg shadow-red-900/30 ring-1 ring-red-500/50">New</span>
        </div>
        {% if episode.duration %}
        <div class="absolute top-3 right-3 z-20">
            <span class="px-2 py-1 bg-black/70 backdrop-blur-md text-white text-[10px] font-medium rounded">{{ episode.duration }} min</span>
        </div>
        {% endif %}
        <div class="absolute bottom-0 left-0 right-0 p-4 transform translate-y-1 group-hover:translate-y-0 transition-transform duration-500 z-20">
            <h3 class="font-serif font-bold text-white text-sm leading-tight mb-1 drop-shadow-lg line-clamp-1 group-hover:text-turkish-gold transition-colors duration-300">{{ episode.series_title | default(value=episode.title) }}</h3>
            <div class="flex items-center gap-2 text-xs text-gray-300 font-medium">
                <span class="px-1.5 py-0.5 bg-turkish-red/20 text-turkish-red rounded text-[10px] font-bold">S{{ episode.season_number }}</span>
                <span class="text-gray-500">•</span>
                <span class="text-gray-400">Episode {{ episode.episode_number }}</span>
            </div>
        </div>
    </div>
</a>
